# Local PostgreSQL — default for backend (see backend/.env.example).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aitrends
      POSTGRES_PASSWORD: aitrends
      POSTGRES_DB: aitrends
    ports:
      - "5432:5432"
    volumes:
      - aitrends_pg_data:/var/lib/postgresql/data

volumes:
  aitrends_pg_data:
