# AiTrends 公网站点（Ubuntu Nginx 标准：仅 sites-available 存配置，sites-enabled 只放符号链接）
#
# 部署步骤概要：
#   sudo cp aitrends.conf /etc/nginx/sites-available/aitrends
#   sudo ln -sf /etc/nginx/sites-available/aitrends /etc/nginx/sites-enabled/aitrends
#   sudo nginx -t && sudo systemctl reload nginx
#
# 切勿把备份 *.bak 留在 /etc/nginx/sites-enabled/ —— 会被 include 进来，导致 server_name 重复。
#
# 路径按实际安装目录修改（默认 /opt/aitrends）。
# SSL 证书路径按你证书位置修改。

server {
    listen 80;
    listen [::]:80;
    server_name ai-trends.news www.ai-trends.news;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai-trends.news www.ai-trends.news;

    ssl_certificate     /etc/nginx/ssl/ai-trends.news_bundle.pem;
    ssl_certificate_key   /etc/nginx/ssl/ai-trends.news.key;
    ssl_protocols         TLSv1.2 TLSv1.3;
    ssl_ciphers           HIGH:!aNULL:!MD5;
    ssl_session_cache     shared:SSL:10m;
    ssl_session_timeout   1d;

    root  /opt/aitrends/frontend/dist;
    index index.html;
    charset utf-8;

    # 管理端 / 连接器上传安装包等
    client_max_body_size 64m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 管理端静态资源（Vite hashed assets）
    location /admin/assets/ {
        alias /opt/aitrends/frontend/admin/dist/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 子路径 SPA：alias 与 try_files 最后一项不能写成 /admin/index.html（会落到 server root，错用公开站 index）
    location = /admin {
        return 301 /admin/;
    }

    location = /admin/index.html {
        alias /opt/aitrends/frontend/admin/dist/index.html;
    }

    location ^~ /admin/ {
        alias /opt/aitrends/frontend/admin/dist/;
        try_files $uri $uri/ @admin_spa_fallback;
    }

    location @admin_spa_fallback {
        rewrite ^ /admin/index.html last;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
