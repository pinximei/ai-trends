name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aitrends
          POSTGRES_PASSWORD: aitrends
          POSTGRES_DB: aitrends
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aitrends -d aitrends"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AITRENDS_DATABASE_URL: postgresql+psycopg://aitrends:aitrends@127.0.0.1:5432/aitrends
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Service postgres is already waited by Actions (Docker healthcheck) before steps run; no apt/postgresql-client.

      - run: pip install -e .
      - run: python -m pytest tests/ -q
