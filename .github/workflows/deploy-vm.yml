# 仅在推送版本 tag（v*）或手动 Run workflow 时：pytest → SSH 部署。
# 日常 push main 只跑 .github/workflows/ci.yml，不触发本工作流。
# 发布示例：git tag v0.1.2 && git push origin v0.1.2
# 详见 docs/deploy-tencent-cvm.md §2.1 / §2.2。
name: deploy-vm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: deploy-vm-production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aitrends
          POSTGRES_PASSWORD: aitrends
          POSTGRES_DB: aitrends
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aitrends -d aitrends"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AITRENDS_DATABASE_URL: postgresql+psycopg://aitrends:aitrends@127.0.0.1:5432/aitrends
      CI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          for i in $(seq 1 45); do
            if pg_isready -h 127.0.0.1 -p 5432 -U aitrends -d aitrends; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            echo "waiting for postgres ($i/45)..."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time."
          exit 1

      - name: Install dependencies & run tests
        run: |
          pip install -e .
          python -m pytest tests/ -q

      # HOST/USER 可读 Variables 或 Secrets；认证须二选一：Secret 私钥，或 Secret 密码（勿把密码放在 Variables，会在界面明文展示）。
      - name: Detect deploy credentials
        id: deploy
        run: |
          echo "ready=${{ (secrets.AITRENDS_DEPLOY_HOST != '' || vars.AITRENDS_DEPLOY_HOST != '') && (secrets.AITRENDS_DEPLOY_USER != '' || vars.AITRENDS_DEPLOY_USER != '') && (secrets.AITRENDS_DEPLOY_SSH_KEY != '' || secrets.AITRENDS_DEPLOY_SSH_PASSWORD != '') }}" >> "$GITHUB_OUTPUT"
          echo "method=${{ secrets.AITRENDS_DEPLOY_SSH_KEY != '' && 'key' || (secrets.AITRENDS_DEPLOY_SSH_PASSWORD != '' && 'password' || 'none') }}" >> "$GITHUB_OUTPUT"

      # 路径/unit 可读 Variables 或 Secrets（你放在 Repository secrets 时须在此写 secrets.*，仅写 vars 会读不到）。
      - name: Resolve VM paths for SSH
        id: vm_paths
        if: steps.deploy.outputs.ready == 'true'
        run: |
          echo "repo_dir=${{ vars.AITRENDS_VM_REPO_DIR || vars.AITRENDS_DEPLOY_VM_REPO_DIR || vars.AITRENDS_REMOTE_REPO_DIR || secrets.AITRENDS_DEPLOY_VM_REPO_DIR || secrets.AITRENDS_DEPLOY_DIR || '/opt/aitrends' }}" >> "$GITHUB_OUTPUT"
          echo "systemd_unit=${{ vars.AITRENDS_VM_SYSTEMD_UNIT || vars.AITRENDS_DEPLOY_VM_SYSTEMD_UNIT || vars.AITRENDS_REMOTE_SYSTEMD_UNIT || secrets.AITRENDS_DEPLOY_SYSTEMD_UNIT || 'aitrends-backend' }}" >> "$GITHUB_OUTPUT"
          echo "--- Resolved VM paths (Variables + Secrets) ---"
          cat "$GITHUB_OUTPUT"

      - name: Deploy over SSH (private key)
        if: steps.deploy.outputs.ready == 'true' && steps.deploy.outputs.method == 'key'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.AITRENDS_DEPLOY_HOST || vars.AITRENDS_DEPLOY_HOST }}
          username: ${{ secrets.AITRENDS_DEPLOY_USER || vars.AITRENDS_DEPLOY_USER }}
          key: ${{ secrets.AITRENDS_DEPLOY_SSH_KEY }}
          port: ${{ secrets.AITRENDS_DEPLOY_SSH_PORT || '22' }}
          command_timeout: 25m
          request_pty: true
          script: |
            set -euo pipefail
            cd "${{ steps.vm_paths.outputs.repo_dir }}"
            git fetch origin
            git reset --hard ${{ github.sha }}
            export AITRENDS_DEPLOY_SYSTEMD_UNIT="${{ steps.vm_paths.outputs.systemd_unit }}"
            bash scripts/vm_deploy.sh

      - name: Deploy over SSH (password)
        if: steps.deploy.outputs.ready == 'true' && steps.deploy.outputs.method == 'password'
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.AITRENDS_DEPLOY_HOST || vars.AITRENDS_DEPLOY_HOST }}
          username: ${{ secrets.AITRENDS_DEPLOY_USER || vars.AITRENDS_DEPLOY_USER }}
          password: ${{ secrets.AITRENDS_DEPLOY_SSH_PASSWORD }}
          port: ${{ secrets.AITRENDS_DEPLOY_SSH_PORT || '22' }}
          command_timeout: 25m
          request_pty: true
          script: |
            set -euo pipefail
            cd "${{ steps.vm_paths.outputs.repo_dir }}"
            git fetch origin
            git reset --hard ${{ github.sha }}
            export AITRENDS_DEPLOY_SYSTEMD_UNIT="${{ steps.vm_paths.outputs.systemd_unit }}"
            bash scripts/vm_deploy.sh

      - name: Skip deploy (missing credentials)
        if: steps.deploy.outputs.ready != 'true'
        run: |
          echo "::notice::部署凭据不完整，已跳过远端 Linux 部署。"
          echo "常见原因：把 HOST/USER/密码填在了 Variables，但此前工作流只读 Secrets；或缺少私钥/密码 Secret。"
          echo ""
          echo "请核对（名称须一致）："
          echo "  • HOST：Secrets 或 Variables 任一设置 AITRENDS_DEPLOY_HOST"
          echo "  • USER：Secrets 或 Variables 任一设置 AITRENDS_DEPLOY_USER"
          echo "  • 登录方式（二选一）："
          echo "      – Secrets → AITRENDS_DEPLOY_SSH_KEY（推荐，私钥全文）"
          echo "      – Secrets → AITRENDS_DEPLOY_SSH_PASSWORD（密码勿放在 Variables，会明文可见）"
          echo "  • 远端路径 / systemd：Variables **或** Secrets → AITRENDS_DEPLOY_VM_REPO_DIR（或 AITRENDS_DEPLOY_DIR）、AITRENDS_DEPLOY_SYSTEMD_UNIT（或 Variables 里 AITRENDS_VM_*）"
          echo "说明见 docs/deploy-tencent-cvm.md §2.1"
